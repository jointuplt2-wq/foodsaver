<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74ebd5"/>
      <stop offset="100%" style="stop-color:#48c6ef"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- 냉장고 본체 -->
  <rect x="22" y="12" width="56" height="76" rx="7" fill="url(#body)"/>

  <!-- 냉동칸 (위) -->
  <rect x="22" y="12" width="56" height="28" rx="7" fill="#48c6ef"/>
  <!-- 냉장칸 구분선 -->
  <rect x="22" y="37" width="56" height="4" fill="#2a9dbf"/>

  <!-- 냉동칸 손잡이 -->
  <rect x="58" y="20" width="6" height="14" rx="3" fill="white" opacity="0.8"/>
  <!-- 냉장칸 손잡이 -->
  <rect x="58" y="52" width="6" height="20" rx="3" fill="white" opacity="0.8"/>

  <!-- D-day 뱃지 -->
  <circle cx="74" cy="74" r="16" fill="#ff4757"/>
  <text x="74" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white">D!</text>
</svg>
