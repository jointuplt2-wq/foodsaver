<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 배경 원 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ed573"/>
      <stop offset="100%" style="stop-color:#1abc9c"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- 새싹 줄기 -->
  <line x1="50" y1="75" x2="50" y2="42" stroke="url(#leaf)" stroke-width="5" stroke-linecap="round"/>

  <!-- 왼쪽 잎 -->
  <path d="M50 55 Q30 45 28 28 Q42 30 50 45 Z" fill="url(#leaf)" opacity="0.9"/>

  <!-- 오른쪽 잎 -->
  <path d="M50 48 Q68 36 72 20 Q58 24 50 40 Z" fill="url(#leaf)"/>

  <!-- D-day 뱃지 -->
  <circle cx="72" cy="72" r="18" fill="#ff4757"/>
  <text x="72" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">D!</text>
</svg>
